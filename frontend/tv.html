<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusOps — Modo TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #fff;
      --bg-secondary: #f5f5f5;
      --text: #000;
      --text-muted: #666;
      --border: #e0e0e0;
      --card-bg: #fff;
    }
    
    body.dark-mode {
      --bg: #0a0a0f;
      --bg-secondary: #111118;
      --text: #fff;
      --text-muted: #999;
      --border: #1e1e2e;
      --card-bg: #1a1a2e;
    }
    
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      transition: background .3s, color .3s;
    }
    
    .tv-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      gap: 16px;
    }
    
    /* HEADER */
    .tv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    .tv-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .tv-logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .tv-live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      color: #10b981;
    }
    
    .tv-live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }
    
    .tv-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .tv-time {
      font-size: 13px;
      color: var(--text-muted);
      font-family: monospace;
    }
    
    /* MAIN REVENUE DISPLAY */
    .tv-revenue-section {
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff9e6 0%, #fffaf0 100%);
      border: 2px solid #ffd700;
      border-radius: 20px;
      padding: 32px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    
    body.dark-mode .tv-revenue-section {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
      border-color: #ffd700;
    }
    
    .tv-revenue-section::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }
    
    .tv-revenue-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    
    .tv-revenue-label {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      color: #666;
    }
    
    body.dark-mode .tv-revenue-label {
      color: #999;
    }
    
    .tv-revenue-value {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -2px;
      font-family: monospace;
      color: #ffd700;
      line-height: 1;
    }
    
    .tv-revenue-update {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* CHANNELS ROW */
    .tv-channels-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0;
    }
    
    .tv-channel {
      display: flex;
      flex-direction: column;
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: border-color .3s;
    }
    
    .tv-channel:hover {
      border-color: #ffd700;
    }
    
    .tv-channel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    
    .tv-channel-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    .tv-channel-badge.vtex {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 2px solid #ef4444;
    }
    
    .tv-channel-badge.meli {
      background: rgba(255, 215, 0, 0.15);
      color: #ffc000;
      border: 2px solid #ffc000;
    }
    
    body.dark-mode .tv-channel-badge.vtex {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    
    body.dark-mode .tv-channel-badge.meli {
      background: rgba(255, 215, 0, 0.2);
      color: #fcd34d;
    }
    
    .tv-channel-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .tv-channel-name-main {
      font-size: 14px;
      font-weight: 700;
    }
    
    .tv-channel-name-sub {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    /* CHANNEL METRICS */
    .tv-channel-metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
      flex: 1;
    }
    
    .tv-metric {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .tv-metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .tv-metric-value {
      font-size: 22px;
      font-weight: 700;
      font-family: monospace;
      color: var(--text);
      line-height: 1;
    }
    
    /* CHANNEL REVENUE HIGHLIGHT */
    .tv-channel-revenue {
      background: linear-gradient(135deg, #fff9e6 0%, #fffaf0 100%);
      border: 2px solid #ffd700;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    
    body.dark-mode .tv-channel-revenue {
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
    }
    
    .tv-channel-revenue-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      color: #666;
    }
    
    body.dark-mode .tv-channel-revenue-label {
      color: #999;
    }
    
    .tv-channel-revenue-value {
      font-size: 28px;
      font-weight: 800;
      font-family: monospace;
      color: #ffd700;
      line-height: 1;
    }
    
    /* TOP PRODUCTS */
    .tv-products-section {
      background: var(--card-bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      flex-shrink: 0;
      max-height: 240px;
      overflow-y: auto;
    }
    
    .tv-products-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-muted);
    }
    
    .tv-product-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    
    .tv-product-row:last-child {
      border-bottom: none;
    }
    
    .tv-product-rank {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      color: #000;
      border-radius: 4px;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
    }
    
    .tv-product-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    
    .tv-product-badge.vtex {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .tv-product-badge.meli {
      background: #fef3c7;
      color: #92400e;
    }
    
    body.dark-mode .tv-product-badge.vtex {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    
    body.dark-mode .tv-product-badge.meli {
      background: rgba(255, 215, 0, 0.2);
      color: #fcd34d;
    }
    
    .tv-product-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    
    .tv-product-qty {
      font-family: monospace;
      font-weight: 600;
      color: #ffd700;
      flex-shrink: 0;
      width: 50px;
      text-align: right;
    }
    
    /* THEME TOGGLE */
    .tv-theme-toggle {
      display: flex;
      gap: 6px;
      padding: 4px;
      background: var(--bg-secondary);
      border-radius: 6px;
    }
    
    .tv-theme-btn {
      padding: 6px 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      border-radius: 4px;
      transition: all .2s;
      font-weight: 600;
    }
    
    .tv-theme-btn.active {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #ffd700;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <!-- HEADER -->
    <div class="tv-header">
      <div class="tv-header-left">
        <div class="tv-logo">⬡ NexusOps</div>
        <div class="tv-live-badge">
          <div class="tv-live-dot"></div>
          En vivo
        </div>
      </div>
      <div class="tv-header-right">
        <div class="tv-time" id="tvTime"></div>
        <div class="tv-theme-toggle">
          <button class="tv-theme-btn active" id="btnLight" onclick="setTheme('light')">☀</button>
          <button class="tv-theme-btn" id="btnDark" onclick="setTheme('dark')">🌙</button>
        </div>
      </div>
    </div>
    
    <!-- MAIN REVENUE -->
    <div class="tv-revenue-section">
      <div class="tv-revenue-content">
        <div class="tv-revenue-label">Ventas de hoy en vivo</div>
        <div class="tv-revenue-value" id="tvTotalRevenue">$0</div>
        <div class="tv-revenue-update">Actualizado hace <span id="tvLastUpdate">0</span> segundos</div>
      </div>
    </div>
    
    <!-- CHANNELS: VTEX + MELI -->
    <div class="tv-channels-section">
      <!-- VTEX -->
      <div class="tv-channel">
        <div class="tv-channel-header">
          <div class="tv-channel-badge vtex">VTEX</div>
          <div class="tv-channel-name">
            <div class="tv-channel-name-main">Canal propio</div>
            <div class="tv-channel-name-sub">Tu tienda VTEX</div>
          </div>
        </div>
        
        <div class="tv-channel-metrics">
          <div class="tv-metric">
            <div class="tv-metric-label">Órdenes</div>
            <div class="tv-metric-value" id="tvVtexOrders">0</div>
          </div>
          <div class="tv-metric">
            <div class="tv-metric-label">Unidades</div>
            <div class="tv-metric-value" id="tvVtexUnits">0</div>
          </div>
          <div class="tv-metric">
            <div class="tv-metric-label">Ticket</div>
            <div class="tv-metric-value" id="tvVtexTicket">$0</div>
          </div>
          <div class="tv-metric">
            <div class="tv-metric-label">% Total</div>
            <div class="tv-metric-value" id="tvVtexPct">0%</div>
          </div>
        </div>
        
        <div class="tv-channel-revenue">
          <div class="tv-channel-revenue-label">Ingresos</div>
          <div class="tv-channel-revenue-value" id="tvVtexRevenue">$0</div>
        </div>
      </div>
      
      <!-- MELI (suma de #1 + #2) -->
      <div class="tv-channel">
        <div class="tv-channel-header">
          <div class="tv-channel-badge meli">ML</div>
          <div class="tv-channel-name">
            <div class="tv-channel-name-main">Mercado Libre</div>
            <div class="tv-channel-name-sub">#1 + #2</div>
          </div>
        </div>
        
        <div class="tv-channel-metrics">
          <div class="tv-metric">
            <div class="tv-metric-label">Órdenes</div>
            <div class="tv-metric-value" id="tvMeliOrders">0</div>
          </div>
          <div class="tv-metric">
            <div class="tv-metric-label">Unidades</div>
            <div class="tv-metric-value" id="tvMeliUnits">0</div>
          </div>
          <div class="tv-metric">
            <div class="tv-metric-label">Ticket</div>
            <div class="tv-metric-value" id="tvMeliTicket">$0</div>
          </div>
          <div class="tv-metric">
            <div class="tv-metric-label">% Total</div>
            <div class="tv-metric-value" id="tvMeliPct">0%</div>
          </div>
        </div>
        
        <div class="tv-channel-revenue">
          <div class="tv-channel-revenue-label">Ingresos</div>
          <div class="tv-channel-revenue-value" id="tvMeliRevenue">$0</div>
        </div>
      </div>
    </div>
    
    <!-- TOP PRODUCTS -->
    <div class="tv-products-section">
      <div class="tv-products-title">🏆 Productos más vendidos hoy</div>
      <div id="tvProductsList"></div>
    </div>
  </div>
  
  <script>
    const fmt = n => {
      const num = Math.round(n || 0);
      return '$' + num.toLocaleString('es-AR');
    };
    const fmtNum = n => Math.round(n || 0).toLocaleString('es-AR');
    
    // Tema claro/oscuro
    function initTheme() {
      const saved = localStorage.getItem('nexusops-theme') || 'light';
      setTheme(saved);
    }
    
    function setTheme(theme) {
      localStorage.setItem('nexusops-theme', theme);
      const isDark = theme === 'dark';
      document.body.classList.toggle('dark-mode', isDark);
      document.getElementById('btnLight').classList.toggle('active', !isDark);
      document.getElementById('btnDark').classList.toggle('active', isDark);
    }
    
    // Actualizar hora
    function updateTime() {
      const now = new Date();
      const time = now.toLocaleTimeString('es-AR', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
      document.getElementById('tvTime').textContent = time;
      
      const lastUpdate = Math.floor((Date.now() - window.lastFetch) / 1000);
      document.getElementById('tvLastUpdate').textContent = Math.min(60, lastUpdate);
    }
    
    setInterval(updateTime, 1000);
    window.lastFetch = Date.now();
    
    // Obtener datos y actualizar
    async function updateTV() {
      const today = new Date().toISOString().split('T')[0];
      const baseUrl = '/api/v1';
      
      try {
        const [tv, channels, topProds] = await Promise.all([
          fetch(`${baseUrl}/metrics/executive?date_from=${today}&date_to=${today}`).then(r => r.json()).catch(() => ({})),
          fetch(`${baseUrl}/dashboard/channels?date_from=${today}&date_to=${today}`).then(r => r.json()).catch(() => ({})),
          fetch(`${baseUrl}/products/top?date_from=${today}&date_to=${today}&limit=8`).then(r => r.json()).catch(() => ({})),
        ]);
        
        // Total
        const totalRev = Number(tv.total_revenue || 0);
        const totalOrd = Number(tv.orders_count || 0);
        const totalUnd = Number(tv.units_sold || 0);
        
        document.getElementById('tvTotalRevenue').textContent = fmt(totalRev);
        window.lastFetch = Date.now();
        
        // Canales
        const chans = channels?.data || [];
        function sumCh(srcs) {
          const rows = chans.filter(c => srcs.includes(c.source));
          return {
            rev: rows.reduce((a, r) => a + Number(r.total_revenue || 0), 0),
            ord: rows.reduce((a, r) => a + Number(r.orders_count || 0), 0),
            und: rows.reduce((a, r) => a + Number(r.units_sold || 0), 0),
            tick: rows.reduce((a, r) => a + Number(r.total_revenue || 0), 0) / Math.max(1, rows.reduce((a, r) => a + Number(r.orders_count || 0), 0))
          };
        }
        
        const vtex = sumCh(['vtex']);
        const meli = sumCh(['meli_1', 'meli_2', 'ml_1', 'ml_2']);
        
        document.getElementById('tvVtexRevenue').textContent = fmt(vtex.rev);
        document.getElementById('tvVtexOrders').textContent = vtex.ord;
        document.getElementById('tvVtexUnits').textContent = vtex.und;
        document.getElementById('tvVtexTicket').textContent = fmt(vtex.tick);
        document.getElementById('tvVtexPct').textContent = totalRev > 0 ? Math.round(vtex.rev / totalRev * 100) + '%' : '0%';
        
        document.getElementById('tvMeliRevenue').textContent = fmt(meli.rev);
        document.getElementById('tvMeliOrders').textContent = meli.ord;
        document.getElementById('tvMeliUnits').textContent = meli.und;
        document.getElementById('tvMeliTicket').textContent = fmt(meli.tick);
        document.getElementById('tvMeliPct').textContent = totalRev > 0 ? Math.round(meli.rev / totalRev * 100) + '%' : '0%';
        
        // Top productos
        const prods = topProds?.data || [];
        const prodList = document.getElementById('tvProductsList');
        prodList.innerHTML = prods.slice(0, 8).map((p, i) => {
          const src = (p.source || '').toLowerCase();
          const badge = src.includes('vtex') ? 'vtex' : 'meli';
          const label = badge === 'vtex' ? 'VTEX' : 'ML';
          return `<div class="tv-product-row">
            <div class="tv-product-rank">${i + 1}</div>
            <div class="tv-product-badge ${badge}">${label}</div>
            <div class="tv-product-name">${p.product_name || 'Producto'}</div>
            <div class="tv-product-qty">${Number(p.quantity || 0)} ud</div>
          </div>`;
        }).join('') || '<div style="color: var(--text-muted); padding: 12px; text-align: center;">Sin datos disponibles</div>';
        
      } catch (e) {
        console.error('Error updating TV:', e);
      }
    }
    
    // Inicializar
    initTheme();
    updateTime();
    updateTV();
    
    // Actualizar cada 10 segundos
    setInterval(updateTV, 10000);
  </script>
</body>
</html>
