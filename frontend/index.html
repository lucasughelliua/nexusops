<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NexusOps Marketing Intelligence</title>
  <style>
    :root{
      --bg:#070A12;
      --card:#111827;
      --muted:#94A3B8;
      --text:#F8FAFC;
      --line:#1F2937;
      --accent:#7C3AED;
      --good:#22C55E;
      --bad:#EF4444;
      --warn:#F59E0B;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(135deg,#070A12,#111827);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
    .login{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:100%;max-width:380px;background:rgba(17,24,39,.92);border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 24px 90px rgba(0,0,0,.38)}
    h1{margin:0;font-size:28px;letter-spacing:-.04em}
    h2{margin:0 0 14px;font-size:20px}
    .muted{color:var(--muted)}
    input,select,button{font:inherit}
    input,select{width:100%;background:#0B1220;color:var(--text);border:1px solid var(--line);border-radius:14px;padding:12px 14px;outline:none}
    button{border:0;border-radius:14px;padding:12px 16px;background:var(--accent);color:white;cursor:pointer;font-weight:700}
    button.secondary{background:#1F2937}
    button.danger{background:var(--bad)}
    .app{display:none;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:rgba(7,10,18,.88);border-right:1px solid var(--line);padding:20px}
    .main{margin-left:260px;padding:24px}
    .nav{display:grid;gap:8px;margin-top:24px}
    .nav button{text-align:left;background:transparent;color:var(--muted)}
    .nav button.active{background:#1F2937;color:#fff}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .card{background:rgba(17,24,39,.86);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 16px 50px rgba(0,0,0,.18)}
    .kpi .label{color:var(--muted);font-size:13px}
    .kpi .value{font-size:26px;font-weight:800;margin-top:8px;letter-spacing:-.04em}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}
    th{color:var(--muted);font-weight:600}
    .section{display:none}
    .section.active{display:block}
    .row{display:flex;gap:10px;align-items:center}
    .right{margin-left:auto}
    @media(max-width:900px){
      .sidebar{position:static;width:auto}
      .main{margin-left:0}
      .grid,.grid-2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="login" class="login">
    <div class="login-card">
      <h1>NexusOps Marketing Intelligence</h1>
      <p class="muted">Ingresá tu PIN de 4 números.</p>
      <input id="pin" maxlength="4" inputmode="numeric" placeholder="••••" />
      <div style="height:12px"></div>
      <button onclick="login()" style="width:100%">Entrar</button>
      <p id="loginError" class="muted"></p>
    </div>
  </div>

  <div id="app" class="app">
    <aside class="sidebar">
      <h1>NexusOps</h1>
      <p class="muted">Marketing Intelligence</p>
      <div class="nav">
        <button class="active" onclick="showSection('overview',this)">Overview</button>
        <button onclick="showSection('meta',this)">Meta Ads</button>
        <button onclick="showSection('organic',this)">Meta Orgánico</button>
        <button onclick="showSection('perfit',this)">Perfit</button>
        <button onclick="showSection('cro',this)">CRO / ROI</button>
        <button id="adminNav" onclick="showSection('admin',this)">Admin</button>
        <button class="secondary" onclick="logout()">Salir</button>
      </div>
    </aside>

    <main class="main">
      <div class="top">
        <div>
          <h1 id="sectionTitle">Overview</h1>
          <p class="muted">Meta + Perfit, sin Kommo. Bendito minimalismo operativo.</p>
        </div>
        <div class="row">
          <input id="dateFrom" type="date">
          <input id="dateTo" type="date">
          <button onclick="loadAll()">Actualizar</button>
        </div>
      </div>

      <section id="overview" class="section active">
        <div id="overviewKpis" class="grid"></div>
      </section>

      <section id="meta" class="section">
        <div id="metaKpis" class="grid"></div>
        <div class="card" style="margin-top:14px">
          <h2>Campañas Meta</h2>
          <div id="metaCampaigns"></div>
        </div>
        <div class="card" style="margin-top:14px">
          <h2>Breakdowns</h2>
          <div class="row">
            <select id="breakdownType" onchange="loadBreakdowns()">
              <option value="age">Edad</option>
              <option value="gender">Género</option>
              <option value="country">País</option>
              <option value="region">Región</option>
              <option value="publisher_platform">Publisher platform</option>
              <option value="platform_position">Placement</option>
              <option value="device_platform">Device platform</option>
              <option value="impression_device">Impression device</option>
            </select>
          </div>
          <div id="metaBreakdowns"></div>
        </div>
      </section>

      <section id="organic" class="section">
        <div class="card">
          <h2>Meta Orgánico</h2>
          <div id="organicTable"></div>
        </div>
      </section>

      <section id="perfit" class="section">
        <div id="perfitKpis" class="grid"></div>
        <div class="card" style="margin-top:14px">
          <h2>Campañas enviadas Perfit</h2>
          <div id="perfitCampaigns"></div>
        </div>
      </section>

      <section id="cro" class="section">
        <div id="croKpis" class="grid"></div>
      </section>

      <section id="admin" class="section">
        <div class="grid-2">
          <div class="card">
            <h2>Crear usuario</h2>
            <input id="newName" placeholder="Nombre">
            <div style="height:10px"></div>
            <input id="newPin" placeholder="PIN 4 números" maxlength="4" inputmode="numeric">
            <div style="height:10px"></div>
            <select id="newRole">
              <option value="viewer">Viewer</option>
              <option value="admin">Admin</option>
            </select>
            <div style="height:10px"></div>
            <button onclick="createUser()">Crear</button>
          </div>
          <div class="card">
            <h2>Usuarios</h2>
            <div id="usersTable"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

<script>
const API_BASE = 'https://TU_WORKER.workers.dev/api/v1';
const API_KEY = 'TU_API_KEY';

const $ = (id) => document.getElementById(id);

function fmt(n, type='num'){
  n = Number(n || 0);
  if(type==='money') return n.toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0});
  if(type==='pct') return n.toLocaleString('es-AR',{maximumFractionDigits:2}) + '%';
  return n.toLocaleString('es-AR',{maximumFractionDigits:2});
}

function sessionToken(){ return localStorage.getItem('nexus_session') || ''; }
function user(){ try{return JSON.parse(localStorage.getItem('nexus_user')||'null')}catch{return null} }

async function api(path, opts={}){
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers:{
      'Content-Type':'application/json',
      'x-api-key':API_KEY,
      'x-session-token':sessionToken(),
      ...(opts.headers||{})
    }
  });
  const data = await res.json();
  if(!res.ok || data.ok === false) throw new Error(data.error || 'Error API');
  return data;
}

async function login(){
  try{
    const pin = $('pin').value.trim();
    const data = await api('/auth/login', {method:'POST', body:JSON.stringify({pin})});
    localStorage.setItem('nexus_session', data.token);
    localStorage.setItem('nexus_user', JSON.stringify(data.user));
    boot();
  }catch(e){
    $('loginError').textContent = e.message;
  }
}

function logout(){
  localStorage.removeItem('nexus_session');
  localStorage.removeItem('nexus_user');
  location.reload();
}

function boot(){
  if(!sessionToken()){
    $('login').style.display='grid';
    $('app').style.display='none';
    return;
  }
  $('login').style.display='none';
  $('app').style.display='block';

  const u = user();
  $('adminNav').style.display = u?.role === 'admin' ? 'block' : 'none';

  const to = new Date();
  const from = new Date(Date.now()-86400000*30);
  $('dateTo').value = to.toISOString().split('T')[0];
  $('dateFrom').value = from.toISOString().split('T')[0];

  loadAll();
}

function range(){
  return `date_from=${$('dateFrom').value}&date_to=${$('dateTo').value}`;
}

function kpi(label,value,type='num'){
  return `<div class="card kpi"><div class="label">${label}</div><div class="value">${fmt(value,type)}</div></div>`;
}

function table(rows, cols){
  if(!rows?.length) return '<p class="muted">Sin datos disponibles.</p>';
  return `<table><thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead><tbody>${
    rows.map(r=>`<tr>${cols.map(c=>`<td>${c.f ? c.f(r[c.key],r) : (r[c.key] ?? '')}</td>`).join('')}</tr>`).join('')
  }</tbody></table>`;
}

function showSection(id, btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  $(id).classList.add('active');
  btn.classList.add('active');
  $('sectionTitle').textContent = btn.textContent;
  if(id==='admin') loadUsers();
}

async function loadAll(){
  await Promise.allSettled([
    loadOverview(),
    loadMeta(),
    loadBreakdowns(),
    loadOrganic(),
    loadPerfit(),
  ]);
}

async function loadOverview(){
  const data = await api(`/marketing/overview?${range()}`);
  const meta = data.data.find(x=>x.source==='meta') || {};
  const perfit = data.data.find(x=>x.source==='perfit') || {};
  $('overviewKpis').innerHTML = [
    kpi('Inversión Meta', meta.spend, 'money'),
    kpi('Revenue atribuido', meta.purchase_value, 'money'),
    kpi('ROAS', meta.roas),
    kpi('ROI', meta.roi, 'pct'),
    kpi('Compras', meta.purchases),
    kpi('CPA', meta.cpa, 'money'),
    kpi('Leads', meta.leads),
    kpi('CTR Meta', meta.ctr, 'pct'),
    kpi('Enviados Perfit', perfit.sent),
    kpi('Open Rate Perfit', perfit.open_rate, 'pct'),
    kpi('CTOR Perfit', perfit.ctor, 'pct'),
    kpi('Clicks Email', perfit.unique_clicks_email),
  ].join('');

  $('croKpis').innerHTML = [
    kpi('Conversion Rate', meta.conversion_rate, 'pct'),
    kpi('Landing Page Views', meta.landing_page_views),
    kpi('CVR Click → Compra', meta.clicks ? (meta.purchases/meta.clicks*100) : 0, 'pct'),
    kpi('AOV', meta.aov, 'money'),
    kpi('CPL', meta.cpl, 'money'),
    kpi('CPC', meta.clicks ? meta.spend/meta.clicks : 0, 'money'),
    kpi('CPM', meta.impressions ? meta.spend/meta.impressions*1000 : 0, 'money'),
    kpi('Frecuencia estimada', meta.reach ? meta.impressions/meta.reach : 0),
  ].join('');
}

async function loadMeta(){
  const camps = await api('/marketing/meta/campaigns');
  const rows = camps.data || [];
  const total = rows.reduce((a,r)=>({
    spend:a.spend+Number(r.spend||0),
    impressions:a.impressions+Number(r.impressions||0),
    clicks:a.clicks+Number(r.clicks||0),
    purchases:a.purchases+Number(r.purchases||0),
    purchase_value:a.purchase_value+Number(r.purchase_value||0),
    leads:a.leads+Number(r.leads||0),
  }), {spend:0,impressions:0,clicks:0,purchases:0,purchase_value:0,leads:0});

  $('metaKpis').innerHTML = [
    kpi('Campañas', rows.length),
    kpi('Spend', total.spend, 'money'),
    kpi('Revenue', total.purchase_value, 'money'),
    kpi('ROAS', total.spend ? total.purchase_value/total.spend : 0),
  ].join('');

  $('metaCampaigns').innerHTML = table(rows, [
    {key:'name',label:'Campaña'},
    {key:'status',label:'Estado'},
    {key:'objective',label:'Objetivo'},
    {key:'spend',label:'Spend',f:v=>fmt(v,'money')},
    {key:'impressions',label:'Imp.'},
    {key:'clicks',label:'Clicks'},
    {key:'purchases',label:'Compras'},
    {key:'purchase_value',label:'Revenue',f:v=>fmt(v,'money')},
    {key:'roas',label:'ROAS',f:v=>fmt(v)}
  ]);
}

async function loadBreakdowns(){
  const type = $('breakdownType').value;
  const data = await api(`/marketing/meta/breakdowns?${range()}&type=${type}`);
  $('metaBreakdowns').innerHTML = table(data.data, [
    {key:'breakdown_value',label:'Valor'},
    {key:'impressions',label:'Imp.'},
    {key:'reach',label:'Reach'},
    {key:'clicks',label:'Clicks'},
    {key:'spend',label:'Spend',f:v=>fmt(v,'money')},
    {key:'purchases',label:'Compras'},
    {key:'purchase_value',label:'Revenue',f:v=>fmt(v,'money')},
    {key:'roas',label:'ROAS',f:v=>fmt(v)}
  ]);
}

async function loadOrganic(){
  const data = await api(`/marketing/meta/organic?${range()}`);
  $('organicTable').innerHTML = table(data.data, [
    {key:'date',label:'Fecha'},
    {key:'source',label:'Fuente'},
    {key:'followers',label:'Followers'},
    {key:'fans',label:'Fans'},
    {key:'impressions',label:'Imp.'},
    {key:'reach',label:'Reach'},
    {key:'profile_views',label:'Perfil'},
    {key:'website_clicks',label:'Web clicks'},
    {key:'posts',label:'Posts'}
  ]);
}

async function loadPerfit(){
  const data = await api('/marketing/perfit/campaigns');
  const rows = data.data || [];
  const totals = rows.reduce((a,r)=>({
    sent:a.sent+Number(r.sent||0),
    delivered:a.delivered+Number(r.delivered||0),
    unique_opens:a.unique_opens+Number(r.unique_opens||0),
    unique_clicks:a.unique_clicks+Number(r.unique_clicks||0),
  }), {sent:0,delivered:0,unique_opens:0,unique_clicks:0});

  $('perfitKpis').innerHTML = [
    kpi('Campañas enviadas', rows.length),
    kpi('Enviados', totals.sent),
    kpi('Open Rate', totals.delivered ? totals.unique_opens/totals.delivered*100 : 0, 'pct'),
    kpi('CTOR', totals.unique_opens ? totals.unique_clicks/totals.unique_opens*100 : 0, 'pct'),
  ].join('');

  $('perfitCampaigns').innerHTML = table(rows, [
    {key:'name',label:'Campaña'},
    {key:'status',label:'Estado'},
    {key:'created_at',label:'Fecha',f:v=>v ? String(v).slice(0,10) : ''},
    {key:'sent',label:'Enviados'},
    {key:'delivered',label:'Entregados'},
    {key:'unique_opens',label:'Aperturas únicas'},
    {key:'unique_clicks',label:'Clicks únicos'},
    {key:'open_rate',label:'Open Rate',f:v=>fmt(v,'pct')},
    {key:'click_rate',label:'Click Rate',f:v=>fmt(v,'pct')},
    {key:'ctor',label:'CTOR',f:v=>fmt(v,'pct')},
    {key:'unsubscribes',label:'Bajas'}
  ]);
}

async function loadUsers(){
  try{
    const data = await api('/admin/users');
    $('usersTable').innerHTML = table(data.data, [
      {key:'name',label:'Nombre'},
      {key:'role',label:'Rol'},
      {key:'active',label:'Activo',f:v=>v?'Sí':'No'},
      {key:'id',label:'Acciones',f:(v,r)=>`
        <button class="secondary" onclick="resetPin('${v}')">PIN</button>
        <button class="danger" onclick="disableUser('${v}')">Desactivar</button>
      `}
    ]);
  }catch(e){
    $('usersTable').innerHTML = `<p class="muted">${e.message}</p>`;
  }
}

async function createUser(){
  await api('/admin/users', {
    method:'POST',
    body:JSON.stringify({
      name:$('newName').value,
      pin:$('newPin').value,
      role:$('newRole').value
    })
  });
  $('newName').value='';
  $('newPin').value='';
  loadUsers();
}

async function resetPin(id){
  const pin = prompt('Nuevo PIN de 4 números');
  if(!pin) return;
  await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({pin})});
  loadUsers();
}

async function disableUser(id){
  await api(`/admin/users/${id}`, {method:'PATCH', body:JSON.stringify({active:false})});
  loadUsers();
}

boot();
</script>
</body>
</html>
