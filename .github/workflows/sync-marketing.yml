name: Sync Marketing

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Fuente a sincronizar: google_ads, perfit, kommo o all"
        required: true
        default: "all"

  schedule:
    - cron: "*/30 * * * *"

jobs:
  sync-marketing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: jobs
        run: npm install

      - name: Sync marketing sources
        working-directory: jobs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

          GOOGLE_SHEETS_WEBAPP_URL: ${{ secrets.GOOGLE_SHEETS_WEBAPP_URL }}
          GOOGLE_SHEETS_WEBAPP_TOKEN: ${{ secrets.GOOGLE_SHEETS_WEBAPP_TOKEN }}

          PERFIT_ACCOUNT: ${{ secrets.PERFIT_ACCOUNT }}
          PERFIT_API_KEY: ${{ secrets.PERFIT_API_KEY }}

          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_ACCESS_TOKEN: ${{ secrets.KOMMO_ACCESS_TOKEN }}

          SYNC_DAYS_BACK: 45
        run: node sync-marketing.js ${{ github.event.inputs.source || 'all' }}
