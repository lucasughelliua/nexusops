name: NexusOps Kommo y Logistica

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync-kommo:
    name: Sync Kommo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js kommo
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KOMMO_SUBDOMAIN: ${{ secrets.KOMMO_SUBDOMAIN }}
          KOMMO_ACCESS_TOKEN: ${{ secrets.KOMMO_ACCESS_TOKEN }}

  sync-logistics:
    name: Sync Logistica
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js logistics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOGISTICS_API_URL: ${{ secrets.LOGISTICS_API_URL }}
          LOGISTICS_API_KEY: ${{ secrets.LOGISTICS_API_KEY }}
