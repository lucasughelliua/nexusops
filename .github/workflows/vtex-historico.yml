name: NexusOps VTEX Historico

on:
  workflow_dispatch:

jobs:
  sync-vtex-historico:
    name: Importar 365 dias VTEX
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js vtex
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VTEX_ACCOUNT: ${{ secrets.VTEX_ACCOUNT }}
          VTEX_APP_KEY: ${{ secrets.VTEX_APP_KEY }}
          VTEX_APP_TOKEN: ${{ secrets.VTEX_APP_TOKEN }}
          VTEX_DAYS_BACK: "365"
