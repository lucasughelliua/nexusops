name: NexusOps Metricas y Alertas

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  calculate-metrics:
    name: Calcular metricas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js metrics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  evaluate-alerts:
    name: Evaluar alertas
    needs: calculate-metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js alerts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
