name: NexusOps Sync VTEX y MeLi

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-vtex:
    name: Sync VTEX
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js vtex
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VTEX_ACCOUNT: ${{ secrets.VTEX_ACCOUNT }}
          VTEX_APP_KEY: ${{ secrets.VTEX_APP_KEY }}
          VTEX_APP_TOKEN: ${{ secrets.VTEX_APP_TOKEN }}

  sync-meli-1:
    name: Sync MeLi 1
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js meli_1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ML1_ACCESS_TOKEN: ${{ secrets.ML1_ACCESS_TOKEN }}
          ML1_REFRESH_TOKEN: ${{ secrets.ML1_REFRESH_TOKEN }}
          ML1_CLIENT_ID: ${{ secrets.ML1_CLIENT_ID }}
          ML1_CLIENT_SECRET: ${{ secrets.ML1_CLIENT_SECRET }}
          ML1_SELLER_ID: ${{ secrets.ML1_SELLER_ID }}

  sync-meli-2:
    name: Sync MeLi 2
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jobs/package.json
      - run: cd jobs && npm install
      - run: cd jobs && node sync.js meli_2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ML2_ACCESS_TOKEN: ${{ secrets.ML2_ACCESS_TOKEN }}
          ML2_REFRESH_TOKEN: ${{ secrets.ML2_REFRESH_TOKEN }}
          ML2_CLIENT_ID: ${{ secrets.ML2_CLIENT_ID }}
          ML2_CLIENT_SECRET: ${{ secrets.ML2_CLIENT_SECRET }}
          ML2_SELLER_ID: ${{ secrets.ML2_SELLER_ID }}
